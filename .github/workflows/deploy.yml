name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # позволяет запустить вручную

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # 3. Install dependencies
      - name: Install client dependencies
        run: npm ci
        working-directory: client

      # 4. Build (с базовым путём для GitHub Pages)
      - name: Build React app
        run: npm run build
        working-directory: client
        env:
          VITE_BASE_PATH: /new_3d_printer_site/
          # Укажите URL вашего задеплоенного бэкенда в GitHub Secrets → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # 5. SPA fallback: 404.html редиректит на /?/path, index.html декодирует обратно
      - name: Create 404.html for SPA routing
        run: |
          cat > client/dist/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>3D Print Lab</title>
              <script>
                // spa-github-pages redirect: encode path into query string
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
                  l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
                  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                  l.hash
                );
              </script>
            </head>
            <body></body>
          </html>
          HTMLEOF

      # 6. Deploy to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.sha }}'

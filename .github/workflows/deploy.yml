name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # позволяет запустить вручную

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # 3. Install dependencies
      - name: Install client dependencies
        run: npm ci
        working-directory: client

      # 4. Build (с базовым путём для GitHub Pages)
      - name: Build React app
        run: npm run build
        working-directory: client
        env:
          VITE_BASE_PATH: /new_3d_printer_site/
          # Укажите URL вашего задеплоенного бэкенда в GitHub Secrets → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # 5. SPA fallback: копируем index.html → 404.html
      - name: Create 404.html for SPA routing
        run: cp client/dist/index.html client/dist/404.html

      # 6. Deploy to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.sha }}'

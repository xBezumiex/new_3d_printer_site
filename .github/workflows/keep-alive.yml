name: Keep Render Server Alive

on:
  schedule:
    # Каждые 10 минут — Render засыпает через 15 мин неактивности
    - cron: '*/10 * * * *'
  workflow_dispatch: # можно запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://threed-print-lab-api.onrender.com/health)
          echo "Server status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
          fi

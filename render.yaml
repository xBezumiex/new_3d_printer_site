services:
  - type: web
    name: 3d-print-lab-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # задаётся вручную в Render Dashboard
      - key: JWT_SECRET
        generateValue: true  # Render генерирует автоматически
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://xbezumiex.github.io
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

version: '3.8'

services:
  # ── База данных ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: 3d_print_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 3d_print_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express + Prisma) ───────────────────────────────────────────────
  server:
    build:
      context: ./server
    container_name: 3d_print_server
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/3d_print_db
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_please}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend (React → Nginx) ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_BASE_PATH: /
    container_name: 3d_print_client
    ports:
      - '80:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>3D Print Lab</title>
    <script>
      // Redirect trick for GitHub Pages SPA routing
      // Encodes the current path into a query string and redirects to index.html
      // Script from: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // number of path segments for the repo (1 for /<repo>/)

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
